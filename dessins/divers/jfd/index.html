    <h3>Jean-François Debord</h3>

  <div class="gallery">

    <figure class="gallery-item c1" role="text">
      <p>On dira peintre et professeur.<br> Tu étais fou de peinture, amoureux des formes du vivant.</p>
    </figure>

    <figure class="gallery-item c1" role="img">
      <a href="CdV_41_29.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Jean-François fait le portrait de Blanche, août 2021">
        <img src="CdV_41_29.webp" alt="Jean-François fait le portrait de Blanche, août 2021">
      </a>
      <figcaption>Jean-François fait le portrait de Blanche, août 2021</figcaption>
    </figure>

    <figure class="gallery-item c1" role="text">
      <p class="long">
        Fou qu'on se soit connus. En 2003, tu prends ta retraite de professeur des Beaux-Arts de Paris ; à trois cent kilomètres de là, je ne sais pas encore lire, mais je dessine déjà. Ado, j'entends un ancien élève parler de toi à la radio. J'ai une vingtaine d'année lorsque ta dernière année d'enseignement, filmée par Cyril de Turckheim, est rendue disponible sur internet. Je me plonge dans tes cours et j'y trouve ce que j'étais venu chercher, en vain, en école d'art&nbsp: la morphologie, ou le dessin du corps vivant, par la compréhension de son fonctionnement. On dessine mieux ce que l'on comprend, c'est aussi simple que cela. Sans t'avoir jamais rencontré, tu deviens l’un de mes professeurs préférés.
    </figure>

    <figure class="gallery-item c1-b" role="img">
      <a href="CdV_45_PP_11.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Jean-François au vernissage de son exposition à la galerie Mercier, juin 2022">
        <img src="CdV_45_PP_11.webp" alt="Jean-François au vernissage de son exposition à la galerie Mercier, juin 2022">
      </a>
      <figcaption>Jean-François au vernissage de son exposition à la galerie Mercier, juin 2022</figcaption>
    </figure>


    <figure class="gallery-item c1" role="text">
      <p class="long">
        Je ne retiens pas tout, mais ce que je garde me sers beaucoup. C’est ce que je te dis lorsque je te rencontre par hasard à l’Institut des Beaux-Arts pour une exposition d’Emmanuel Guibert. Nous sommes le 9 septembre 2020. Nous portons le masque&nbsp: je t’ai reconnu à la voix. Tu griffonnes une adresse dans mon carnet et déclare&nbsp: «&nbspécrivez-moi, et dépêchez-vous car je vais bientôt mourir&nbsp».</p>
    </figure>

    <figure class="gallery-item c1-b" role="img">
      <a href="jfd-mot.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="lettre de Jean-François">
        <img src="jfd-mot.webp" alt="lettre de Jean-François ">
      </a>
    </figure>

    <figure class="gallery-item c1" role="text">
      <p class="long">
        Un matin d'hiver 2021, je prends le train pour aller passer quatre jours seuls avec un inconnu. Plusieurs heures en vidéos, 10 minutes en vrai, une lettre. Je vais voir un professeur. Je découvre un peintre. Je rencontre un ami.</p>
    </figure>

    <figure class="gallery-item c2" role="img">
      <a href="CdV_38_06.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Oursonne dort dans un fauteil de l'atelier, janvier 2021">
        <img src="CdV_38_06.webp" alt="Oursonne dort dans un fauteil de l'atelier, janvier 2021">
      </a>
      <figcaption>Oursonne dort dans un fauteil de l'atelier, janvier 2021</figcaption>
    </figure>

    <figure class="gallery-item c2" role="img">
      <a href="CdV_38_07.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Jean-François aussi pique du nez pendant que je le dessine, janvier 2021">
        <img src="CdV_38_07.webp" alt="Jean-François aussi pique du nez pendant que je le dessine, janvier 2021">
      </a>
      <figcaption>Jean-François aussi pique du nez pendant que je le dessine, janvier 2021</figcaption>
    </figure>

    <figure class="gallery-item c1" role="text" id="Delphine">
      <p class="long">
        Et comme Jean-François est indissociable de Delphine, c’est deux artistes et deux amis que nous retournerons voir au <a href="/dessins/carnets/23-25-pays-de-caux/ " target="_blank" rel="noopener">Pays de Caux</a> avec Blanche</a>.</p>
    </figure>

    <figure class="gallery-item c1" role="img">
      <a href="cdv_61_39.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Delphine nous conduit au clos des fées, août 2025">
        <img src="cdv_61_39.webp" alt="Delphine nous conduit au clos des fées, août 2025">
      </a>
      <figcaption>Delphine nous conduit au clos des fées, août 2025</figcaption>
    </figure>

    <figure class="gallery-item c1" role="text">
      <p class="long">
        Nous avons partagé les carnets et les peintures. Parlé des heures, et ri beaucoup. Nous avons dessiné ensemble, je t'ai chanté mes chansons. Parfois, c'était dur. Nous avons eu quatre ans.</p>
    </figure>

    <figure class="gallery-item c1 smallcaption" role="img">
      <a href="Huile_2024.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Jean-François fait le portrait de Blanche, août 2021">
        <img src="Huile_2024.webp" alt="Jean-François fait le portrait de Blanche, août 2021">
      </a>
      <figcaption>Cette peinture est la dernière création que Jean-François a vu de moi. C'est ma première peinture à l'huile. Delphine, qui m'a guidé et prêté son matériel, y a vu une familiarité avec les esquisses du jeune Debord. Jean-François, quelque chose de «&nbsp;franc&nbsp;». C'était en août 2024.</figcaption> 
    </figure>    

    <figure class="gallery-item c1" role="text">
      <p class="long">
        Une semaine avant ta mort, j'avais décidé de me replonger dans tes cours, plus intensément que la première fois&nbsp: j'avais picoré, je voulais les absorber complètement, les compléter quand j'étais incertain d'un détail, dessiner avec toi chacun des 43 tableaux noirs. Et je l'ai fait. J'ai découvert qu'en fait d'un cours c'était trois cours en un : un cours de morphologie, un cours sur la peinture, un cours sur l'enseignement. Et dans chacun, la vie qui déborde. Je voulais faire ce travail depuis des années, je ne savais pas que tu n'en verrais pas le fruit. Quelle importance ? Nous nous sommes vus tels que nous sommes et nous nous sommes aimés. Tu m’as appris à regarder le corps. Je ne regarderai jamais un tibia ou une omoplate sans toi.</p>
    </figure>

    <figure class="gallery-item c2 cdv61" role="img">
      <a href="cdv_61_04.webp" class="glightbox item" data-gallery="carnets 2025" data-description="Extraits des carnets tenus durant l'été 2025">
        <img src="cdv_61_04.webp" alt="Extraits des carnets tenus durant l'été 2025">
      </a>
    </figure>  

    <figure class="gallery-item c2 cdv61" role="img">

    </figure>  

    <figure class="gallery-item c2 cdv61" role="img">
      <a href="cdv_61_20.webp" class="glightbox item" data-gallery="carnets 2025" data-description="Extraits des carnets tenus durant l'été 2025">

    <figure class="gallery-item c2 cdv61" role="img">
      <a href="cdv_61_42.webp" class="glightbox item" data-gallery="carnets 2025" data-description="OOExtraits des carnets tenus durant l'été 2025O">
        <img src="cdv_61_42.webp" alt="Extraits des carnets tenus durant l'été 2025">
      </a>
    </figure>  

    <figure class="gallery-item c1">
      <p class="caption">
        Extraits des carnets tenus durant l'été 2025
      </p>
    </figure>


    <figure class="gallery-item c1" role="text">
      <p class="long">
        Le 29 juin 2025 tu es parti pour toujours. Où que tu sois, où qu’on aille, je pense à toi, retrouvant Cassandre et Le Cœur, Rembrandt et Van Dyck, retrouvant ton père.</p><p class="long">
        1 an plus tôt, je faisais ce rêve&nbsp: <em>«…Jean-François se lève et part dans l'autre pièce, qui est son atelier. Un dessin rempli mon champs de vision&nbsp: Jean-François, coupé par le cadre au bassin, le visage de trois-quart vers le fond, se regarde lui-même partir dans une autre pièce. J'ai l'impression que c'est la dernière fois que je vois Jean-François. Je dis&nbsp: «&nbspJe t'aime, Jean-François.&nbsp» Il se retourne un instant. Je poursuis&nbsp: «&nbspMerci de m'avoir laissé t'aimer.&nbsp»</em></p>
    </figure>

    <figure class="gallery-item c1-b smallcaption" role="img">
      <a href="21_jfd.webp" class="glightbox item" data-gallery="jfd-dessins" data-description="Jean-François s'amuse comme un gosses&nbsp: il fait la reproduction au crayon d'une peinture qu'il aime">
        <img src="21_jfd.webp" alt="Jean-François s'amuse comme un gosses&nbsp: il fait la reproduction au crayon d'une peinture qu'il aime">
      </a>
      <figcaption>Jean-François s'amuse comme un gosse&nbsp: il fait la reproduction au crayon d'une peinture qu'il aime.</figcaption>
    </figure>
