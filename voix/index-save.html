<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Voix</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">

  <style>
    body {
      background-color: #a9a7ab;
      color: #343434;
      animation: fadeBg 1.3s cubic-bezier(0, 0.53, 0.18, 0.91) forwards;
  }

    @keyframes fadeBg {
      from {
        background-color: var(--body-bg-color);
      }
      to {
        background-color: #a9a7ab;
      }
    }

    p {
    margin: 0px 0 10px;
    padding: 0px 100px;
    text-align: center
  }


    .audio-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin: 25px 0;
  }

    .audio-container audio {
      width: 100%;
      max-width: 300px;
  }

    .audio-container button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background-color: #333;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.2s;
  }

    .audio-container button:hover {
      background-color: #555;
  }

    #current-file {
    height: 1.2em; /* réserve une ligne */
    line-height: 1.2em;
    margin: 0;
    font-family: mono;
    font-size: 0.9rem;
  }

    #played-list {
    list-style: none;
    padding: 10px;
    margin-top: 15px;
    text-align: left;
    max-height: 180px;
    overflow-y: auto;
    width: 100%;
    max-width: 300px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.45);
    scrollbar-width: thin;
    scrollbar-color: #999 transparent;
  }

  #played-list li {
    cursor: pointer;
    margin: 6px 0;
    padding: 4px 6px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  #played-list li:hover {
    background: rgba(0, 0, 0, 0.05);
  }
  </style>
</head>

<body class="dessins-grid-page">
  <div class="page">

    <header class="site-header">
      <div class="logo">
        <a href="/">
      <img class="logo-default" src="/assets/logo/logo_ER.png" alt="Logo ER" height="50">
      <img class="logo-hover" src="/assets/logo/Logo_ER_hover.png" alt="Logo ER hover" height="50">
      <img class="logo-active" src="/assets/logo/Logo_ER_active.png" alt="Logo ER active" height="50">
            </a>
      </div>

      <nav class="main-nav">
        <a href="/dessins/">Dessins</a>
        <a href="/livres/">Livres</a>
        <a href="/musique/">Musique</a>
        <a href="/infos/" >Infos</a>
      </nav>
    </header>

    <div class="container">
      <h2>Des échos du passé</h2>
      <p>Je parle seul.</p>
      <p>Des ces heures d'enregistrements, j'ai extrait quelques phrases. Ces miettes sont le témoignage fragmentaire d'un type qui cherche à mener la vie artistique.</p>

      <div class="audio-container">
        <button id="play-random">Écouter</button>
        <audio id="player" controls preload="none" controlsList="nodownload">
          Votre navigateur ne supporte pas l'élément audio.
        </audio>

       <ul id="played-list" style="list-style:none; padding:0; text-align:center; margin-top:15px;"></ul>
      </div>
  </div>

 
<script src="audios/audio-list.js"></script>
<script>
  const player = document.getElementById('player');
  const button = document.getElementById('play-random');
  const playedList = document.getElementById('played-list');

  // Liste pour garder la trace des fichiers déjà joués
  const playedFiles = new Set();

  // Fonction pour jouer un fichier
  function playAudio(file) {
    player.src = file;
    player.play();
  }

  button.addEventListener('click', () => {
    if (playedFiles.size === audios.length) {
      alert("Vous avez tout écouté ! Mais d'autres miettes viendront plus tard.");
      return;
    }

    let i;
    do {
      i = Math.floor(Math.random() * audios.length);
    } while (playedFiles.has(audios[i]));

    const file = audios[i];
    playAudio(file);

    // Ajouter le fichier à la liste affichée seulement s'il n'est pas déjà là
    if (!playedFiles.has(file)) {
      const li = document.createElement('li');
      li.textContent = decodeURIComponent(
        file
          .split('/').pop()
          .replace(/\.[^/.]+$/, '')
      );      li.style.cursor = 'pointer';
      li.style.margin = '5px 0';
      li.style.color = '#333';

      // Cliquer sur le nom relance le fichier
      li.addEventListener('click', () => {
        playAudio(file);
      });

      playedList.prepend(li);
      playedFiles.add(file);
    }
  });

  document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();

    if (player.paused) {
      player.play();
    } else {
      player.pause();
    }
  }
});
</script>

</body>
</html>
