<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Voix</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/voix.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
</head>

<body class="voix-page">
  <div class="page">

    <header class="site-header">
      <div class="logo">
        <a href="/">
          <img class="logo-default" src="/assets/logo/Logo_ER.png" alt="Logo ER" height="50">
          <img class="logo-hover" src="/assets/logo/Logo_ER_hover.png" alt="Logo ER hover" height="50">
          <img class="logo-active" src="/assets/logo/Logo_ER_active.png" alt="Logo ER active" height="50">
        </a>
      </div>

      <nav class="main-nav">
        <a href="/dessins/">Dessins</a>
        <a href="/livres/">Livres</a>
        <a href="/musique/">Musique</a>
        <a href="/infos/">Infos</a>
      </nav>
    </header>

    <div class="container">
      <h3>Entretiens avec moi-même</h3>
      <p>Extraits d'enregistrements faits au fil des années. Ces miettes sont le témoignage fragmentaire d'un jeune homme qui cherche à mener une vie artistique.</p>
      <p>

      <div class="audio-container">

        <div class="controls">
          <button id="play-random">Écouter</button>
          <button id="toggle" hidden>Lire</button>
        </div>

        <audio id="player" preload="none"></audio>

        <div id="now-playing" hidden></div>
        <input id="progress" type="range" min="0" max="100" value="0" hidden>
        <div id="time-display" hidden>0:00 / 0:00</div>

        <div id="sort-controls" class="controls">
          <button id="sort-date" hidden>Par date</button>
          <button id="sort-added" hidden>Par ajout</button>
        </div>

        <ul id="played-list"></ul>

  </div>

</div>

<script src="audios/audio-list.js"></script>
<script src="/assets/js/voix.js"></script>

</body>
</html>
